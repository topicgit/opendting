<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>谛听</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --glass-bg: rgba(255,255,255,0.35);
      --glass-border: rgba(255,255,255,0.45);
      --glass-dark-bg: rgba(20,20,20,0.32);
      --glass-dark-border: rgba(255,255,255,0.06);
      --ink: rgba(0,0,0,0.85);
    }

    /* 页面背景：水墨纸纹 + 轻微渐变 */
    body{
      font-family: 'Noto Serif SC', serif;
      background-image: radial-gradient(circle at 10% 20%, rgba(0,0,0,0.012), transparent 20%),
                        radial-gradient(circle at 90% 80%, rgba(0,0,0,0.008), transparent 20%),
                        linear-gradient(180deg, rgba(250,250,248,1), rgba(240,240,238,1));
      background-color: #fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .dark body{
      background-image: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.02), transparent 20%),
                        radial-gradient(circle at 90% 80%, rgba(255,255,255,0.01), transparent 20%),
                        linear-gradient(180deg, rgba(10,10,12,1), rgba(14,14,16,1));
      background-color: #0b0b0b;
      color: #f7f7f7;
    }

    /* 全局玻璃容器样式 */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(16,24,40,0.12);
    }
    .dark .glass{
      background: var(--glass-dark-bg);
      border: 1px solid var(--glass-dark-border);
      box-shadow: 0 8px 30px rgba(2,6,23,0.6);
    }

    /* 搜索栏专用玻璃（更强光泽） */
    .glass-search{
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.18));
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }
    .dark .glass-search{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* 水墨边框：仿墨迹的微小不规则边缘（装饰） */
    .ink-edge{
      position: relative;
      overflow: visible;
    }
    .ink-edge::after{
      content: '';
      position: absolute;
      inset: -10px -12px -14px -12px;
      background: radial-gradient(circle at 10% 10%, rgba(0,0,0,0.04), transparent 14%),
                  radial-gradient(circle at 90% 90%, rgba(0,0,0,0.03), transparent 12%);
      pointer-events: none;
      filter: blur(6px);
      opacity: .9;
    }
    .dark .ink-edge::after{ opacity: .12; mix-blend-mode: overlay }

    /* 卡片玻璃细节 */
    .nav-card{
          transition: all 0.25s ease;
          transform: translateY(0);
    }
    .nav-card:hover{
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.55); /* 提升一点亮度，保持玻璃效果 */
      backdrop-filter: blur(18px);
    }

    /* iOS 风格圆角与光泽（顶部高光） */
    .glass::before{
      content: '';
      position: absolute; left:0; right:0; top:0;
      height: 40%;
      border-top-left-radius: 16px; border-top-right-radius:16px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.02));
      mix-blend-mode: overlay;
      opacity: .9;
    }

    /* 适配 reduced transparency 偏好 */
    @media (prefers-reduced-transparency: reduce){
      .glass, .glass-search{ backdrop-filter: none; -webkit-backdrop-filter: none; }
    }

    /* 小屏幕优化 */
    @media (max-width:640px){
      .glass{ border-radius:12px }
      .glass-search{ border-radius:12px }
    }

    [v-cloak] { display: none; }
  </style>
</head>

<body class="bg-white text-black dark:bg-black dark:text-white transition-colors duration-500 min-h-screen flex flex-col">
  <div id="app" v-cloak>
    <!-- 顶部：全局玻璃 header -->
    <header class="max-w-5xl mx-auto p-6 glass glass-search relative mt-8 ink-edge">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-4xl font-bold tracking-widest">谛听 · 天枢</h1>
          <p class="mt-1 text-sm opacity-80">听万物 · 辨善恶 · 识真伪</p>
        </div>

       <div class="flex items-center gap-3">
         <button @click="toggleDarkMode" class="px-3 py-2 rounded-lg border border-white/30 text-sm">深色/浅色</button>
       </div>
      </div>
      <!-- 搜索栏（内嵌在 header 的玻璃块） -->
      <div class="mt-5">
          <form action="https://www.google.com/search" method="get" target="_blank" class="flex gap-2">
              <input type="text" name="q" placeholder="使用 Google 搜索..." class="flex-1 p-4 rounded-xl text-sm bg-gradient-to-r from-black/70 via-white/4 to-black/35 backdrop-blur-xl" required>
              <button type="submit" class="px-6 py-4 rounded-xl bg-gray/20 hover:bg-gray/30 backdrop-blur-xl border border-white/30 transition-all">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
          </form>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-8 flex-1">
      <!-- 合并后的卡片展示区 -->
      <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <a
          v-for="site in sites"
          :key="site.name"
          :href="site.url"
          target="_blank"
          class="card group rounded-2xl p-8 bg-white dark:bg-gray-800 shadow-sm border border-transparent
                 hover:border-blue-500/30 hover:shadow-lg transition-all duration-300 cursor-pointer block"
        >
          <div class="flex flex-col items-center text-center">
            <div :class="`text-5xl mb-4 group-hover:scale-110 transition-transform duration-300 ${site.iconColor}`">
              <i :class="site.icon"></i>
            </div>
            <div class="text-xl font-semibold dark:text-white">{{ site.name }}</div>
            <div class="text-gray-500 dark:text-gray-400 text-sm">{{ site.description }}</div>
          </div>
        </a>
      </section>
    </main>

    <footer class="max-w-5xl mx-auto mt-10 p-4 text-center text-xs opacity-70">© 谛听之眼 · 中枢 · 2025</footer>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<script>
const { createApp, ref, onMounted, watch } = Vue;

createApp({
  setup() {
    // 网站数据
    const sites = ref([
      {
        name: '今日热榜',
        url: 'https://tophub.today',
        icon: 'fa-solid fa-fire',
        iconColor: 'text-orange-500',
        description: '新闻资讯聚合的网站'
      },
      {
        name: 'NesNow',
        url: 'https://newsnow.busiyi.world',
        icon: 'fa-solid fa-newspaper',
        iconColor: 'text-blue-500',
        description: '新闻资讯聚合的网站'
      },
      {
        name: 'InfoQ 技术网站',
        url: 'https://www.infoq.cn',
        icon: 'fa-solid fa-laptop-code',
        iconColor: 'text-teal-500',
        description: '互联网资讯技术网站'
      },
      {
        name: '阮一峰博客',
        url: 'https://www.ruanyifeng.com/blog',
        icon: 'fa-solid fa-book-open',
        iconColor: 'text-purple-500',
        description: '技术博客和技术周刊'
      },
      {
        name: 'HelloGithub',
        url: 'https://hellogithub.com',
        icon: 'fa-brands fa-github',
        iconColor: 'text-yellow-500',
        description: 'Github 有趣的项目和软件'
      },
      {
        name: '博客园',
        url: 'https://www.cnblogs.com',
        icon: 'fa-solid fa-rss',
        iconColor: 'text-blue-600',
        description: '中国技术博客网站'
      }
    ]);

    // 暗色模式切换
    const toggleDarkMode = () => {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('waterink-mode', isDark ? 'dark' : 'light');
    };

    // 初始化暗色模式
    onMounted(() => {
      const saved = localStorage.getItem('waterink-mode');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    });

    return {
      sites,
      toggleDarkMode
    };
  }
}).mount('#app');
</script>
</body>
</html>
